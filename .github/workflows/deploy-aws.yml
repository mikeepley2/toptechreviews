name: Deploy AWS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "scripts/**"
      - "assets/**"
      - "infra/aws/**"
      - ".github/workflows/deploy-aws.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: vars.AWS_DEPLOY_ENABLED == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build static site
        run: npm run seed && npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Package click Lambda
        run: |
          mkdir -p build
          cd infra/aws/lambda/click && zip -q ../../../../build/lambda-click.zip index.mjs

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name toptechreviews-click \
            --zip-file fileb://build/lambda-click.zip

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ vars.AWS_SITE_BUCKET }}/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
