AWSTemplateFormatVersion: "2010-09-09"
Description: TopTechReviews.org — S3 static site, CloudFront CDN, Lambda click API

Parameters:
  SiteBucketName:
    Type: String
    Default: toptechreviews-org-site
    Description: Globally unique S3 bucket name for static assets
  DomainName:
    Type: String
    Default: toptechreviews.org
  WwwDomainName:
    Type: String
    Default: www.toptechreviews.org
  AcmCertificateArn:
    Type: String
    Description: ACM certificate ARN in us-east-1 (must cover apex + www)
  MarketingClickApiKey:
    Type: String
    NoEcho: true
    Description: Shared key for ReferIQ POST /api/public/marketing-clicks
  ReferiqMarketingClickUrl:
    Type: String
    Default: https://referiq.net/api/public/marketing-clicks

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref SiteBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}"

  ClickLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ClickLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: toptechreviews-click
      Runtime: nodejs24.x
      Handler: index.handler
      Role: !GetAtt ClickLambdaRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          MARKETING_CLICK_API_KEY: !Ref MarketingClickApiKey
          REFERIQ_MARKETING_CLICK_URL: !Ref ReferiqMarketingClickUrl
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const cors = {
              "Access-Control-Allow-Origin": "*",
              "Access-Control-Allow-Methods": "POST, OPTIONS",
              "Access-Control-Allow-Headers": "Content-Type",
            };
            const method = event.requestContext?.http?.method || event.httpMethod || "GET";
            if (method === "OPTIONS") return { statusCode: 204, headers: cors, body: "" };
            if (method !== "POST") return { statusCode: 405, headers: cors, body: "Method not allowed" };
            let payload;
            try { payload = JSON.parse(event.body || "{}"); } catch { return { statusCode: 400, headers: cors, body: "Invalid JSON" }; }
            const referiqUrl = process.env.REFERIQ_MARKETING_CLICK_URL || "https://referiq.net/api/public/marketing-clicks";
            const apiKey = process.env.MARKETING_CLICK_API_KEY || "";
            const record = {
              site: payload.site || "toptechreviews.org",
              category: payload.category || "",
              vendor: payload.vendor || "",
              destination: payload.destination || "",
              type: payload.type || "outbound",
              path: payload.path || "",
              referrer: payload.referrer || "",
              ts: payload.ts || new Date().toISOString(),
              affiliateNetwork: payload.affiliateNetwork || "",
            };
            if (apiKey) {
              try {
                await fetch(referiqUrl, {
                  method: "POST",
                  headers: { "Content-Type": "application/json", "X-Marketing-Key": apiKey },
                  body: JSON.stringify(record),
                });
              } catch (e) { console.error(e); }
            }
            return { statusCode: 204, headers: cors, body: "" };
          };

  ClickLambdaUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !GetAtt ClickLambda.Arn
      AuthType: NONE
      Cors:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
        AllowHeaders:
          - Content-Type

  ClickLambdaUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ClickLambda
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

  ClickLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ClickLambda
      Action: lambda:InvokeFunction
      Principal: "*"
      InvokedViaFunctionUrl: true

  PrettyUrlsFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: toptechreviews-pretty-urls
      AutoPublish: true
      FunctionConfig:
        Comment: Append index.html for directory-style static paths
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          if (uri.endsWith("/")) {
            request.uri += "index.html";
          } else if (uri.indexOf(".") === -1) {
            request.uri += "/index.html";
          }
          return request;
        }

  SiteOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: toptechreviews-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: TopTechReviews.org static site
        DefaultRootObject: index.html
        Aliases:
          - !Ref DomainName
          - !Ref WwwDomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt SiteOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
          - Id: ClickApiOrigin
            DomainName: !Select [2, !Split ["/", !GetAtt ClickLambdaUrl.FunctionUrl]]
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt PrettyUrlsFunction.FunctionMetadata.FunctionARN
        CacheBehaviors:
          - PathPattern: /api/click*
            TargetOriginId: ClickApiOrigin
            ViewerProtocolPolicy: https-only
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
        HttpVersion: http2and3
        PriceClass: PriceClass_100

Outputs:
  SiteBucketName:
    Value: !Ref SiteBucket
    Export:
      Name: TopTechReviewsSiteBucket
  CloudFrontDistributionId:
    Value: !Ref SiteDistribution
    Export:
      Name: TopTechReviewsDistributionId
  CloudFrontDomainName:
    Value: !GetAtt SiteDistribution.DomainName
    Export:
      Name: TopTechReviewsCloudFrontDomain
  ClickLambdaArn:
    Value: !GetAtt ClickLambda.Arn
