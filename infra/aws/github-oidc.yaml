AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions OIDC deploy role for TopTechReviews.org

Parameters:
  GitHubRepo:
    Type: String
    Default: mikeepley2/toptechreviews
    Description: owner/repo for OIDC trust
  ExistingOidcProviderArn:
    Type: String
    Default: ""
    Description: Optional existing token.actions.githubusercontent.com provider ARN (skip creating a duplicate)
  SiteBucketName:
    Type: String
    Description: S3 bucket from main toptechreviews stack
  CloudFrontDistributionId:
    Type: String
    Description: CloudFront distribution ID from main stack
  LambdaFunctionName:
    Type: String
    Default: toptechreviews-click

Conditions:
  CreateOidcProvider: !Equals [!Ref ExistingOidcProviderArn, ""]

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4e88490a816289812d3ac903a8b5c712b7

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: toptechreviews-github-deploy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateOidcProvider
                - !Ref GitHubOidcProvider
                - !Ref ExistingOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubRepo}:*"
      Policies:
        - PolicyName: toptechreviews-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: S3Deploy
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::${SiteBucketName}"
                  - !Sub "arn:aws:s3:::${SiteBucketName}/*"
              - Sid: CloudFrontInvalidate
                Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                Resource: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistributionId}"
              - Sid: LambdaUpdate
                Effect: Allow
                Action:
                  - lambda:UpdateFunctionCode
                  - lambda:GetFunction
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${LambdaFunctionName}"

Outputs:
  DeployRoleArn:
    Value: !GetAtt GitHubDeployRole.Arn
    Export:
      Name: TopTechReviewsGitHubDeployRoleArn
